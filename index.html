<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>像素字体设计器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="menu-bar">
            <div class="menu-left">
                <h1 class="app-title">像素字体设计器</h1>
            </div>
            <div class="menu-center">
                <div class="font-selector-container">
                    <div id="font-selector" class="font-selector"></div>
                    <div id="font-dropdown" class="font-dropdown"></div>
                </div>
            </div>
            <div class="menu-right">
                <button id="btn-compare" class="menu-btn">对比</button>
                <button id="btn-settings" class="menu-btn">设置</button>
                <button id="btn-import" class="menu-btn">导入</button>
                <button id="btn-export" class="menu-btn">导出 JSON</button>
                <button id="btn-bdf" class="menu-btn">导出 BDF</button>
                <button id="btn-export-gif" class="menu-btn">导出 GIF</button>
                <button id="btn-undo" class="menu-btn" title="撤销 (Ctrl+Z)">↶</button>
                <button id="btn-redo" class="menu-btn" title="重做 (Ctrl+Y)">↷</button>
            </div>
            <input type="file" id="import-file" accept=".json" style="display: none;">
        </header>

        <main class="main-content">
            <section class="editor-section">
                <div class="editor-tabs">
                    <button id="btn-tab-glyphs" class="tab-btn active">字形</button>
                    <button id="btn-tab-ligatures" class="tab-btn">连字</button>
                </div>
                
                <div class="editor-toolbar">
                    <div class="tool-group">
                        <button id="btn-record" class="tool-btn record-btn" title="录制教程">●</button>
                    </div>
                    <div class="tool-group">
                        <button id="btn-tool-pencil" class="tool-btn active" title="铅笔">✏</button>
                        <button id="btn-tool-eraser" class="tool-btn" title="橡皮">⌫</button>
                        <button id="btn-tool-line" class="tool-btn" title="直线">／</button>
                        <button id="btn-tool-rect" class="tool-btn" title="矩形">▢</button>
                        <button id="btn-tool-select" class="tool-btn" title="框选（保存组件）">⊞</button>
                    </div>
                    <div class="tool-group">
                        <button id="btn-clear-glyph" class="tool-btn" title="清空">🗑</button>
                        <button id="btn-copy-glyph" class="tool-btn" title="复制">⎘</button>
                        <button id="btn-paste-glyph" class="tool-btn" title="粘贴">⎙</button>
                        <button id="btn-delete-glyph" class="tool-btn danger" title="删除">✕</button>
                    </div>
                    <div class="tool-group">
                        <button id="btn-flip-h" class="tool-btn" title="水平翻转">⇄</button>
                        <button id="btn-flip-v" class="tool-btn" title="垂直翻转">⇅</button>
                        <button id="btn-rotate-cw" class="tool-btn" title="顺时针旋转">↻</button>
                        <button id="btn-rotate-ccw" class="tool-btn" title="逆时针旋转">↺</button>
                        <button id="btn-bold" class="tool-btn" title="加粗">𝐁</button>
                    </div>
                    <div class="tool-group">
                        <button id="btn-shift-up" class="tool-btn" title="上移">↑</button>
                        <button id="btn-shift-down" class="tool-btn" title="下移">↓</button>
                        <button id="btn-shift-left" class="tool-btn" title="左移">←</button>
                        <button id="btn-shift-right" class="tool-btn" title="右移">→</button>
                    </div>
                </div>

                <div class="editor-header">
                    <div class="current-char-info">
                        <span class="char-display" id="current-char-display">A</span>
                        <span class="char-code" id="current-char-code">U+0041</span>
                    </div>
                </div>

                <div class="canvas-container">
                    <canvas id="glyph-canvas"></canvas>
                </div>
                <div id="playback-controls" class="playback-controls" style="display: none;">
                    <button id="btn-playback-play" class="playback-btn" title="播放/暂停">▶</button>
                    <input type="range" id="playback-progress" class="playback-progress" min="0" max="0" value="0">
                    <select id="playback-speed" class="playback-speed">
                        <option value="0.5">0.5x</option>
                        <option value="1" selected>1x</option>
                        <option value="2">2x</option>
                        <option value="4">4x</option>
                    </select>
                    <span id="playback-step-info" class="playback-step-info">0 / 0</span>
                    <button id="btn-exit-playback" class="playback-btn exit-btn" title="退出回放">✕ 退出回放</button>
                </div>
            </section>

            <aside class="charset-panel">
                <div class="panel-header">
                    <h2>字符集</h2>
                    <div class="charset-controls">
                        <input type="text" id="glyph-filter" placeholder="搜索..." class="search-input">
                        <button id="btn-add-glyph" class="small-btn">+</button>
                    </div>
                </div>
                <div class="charset-grid" id="glyph-set"></div>

                <div class="panel-header">
                    <h2>组件库</h2>
                    <div class="charset-controls">
                        <button id="btn-save-component" class="small-btn" title="从框选区域保存为组件">保存</button>
                    </div>
                </div>
                <div class="component-library" id="component-library"></div>
            </aside>
        </main>

        <footer class="preview-section">
            <div class="preview-controls">
                <div class="control-group">
                    <label>文本:</label>
                    <input type="text" id="preview-text" value="PIXEL Font" class="text-input">
                </div>
                <div class="control-group">
                    <label>倍率:</label>
                    <select id="preview-scale">
                        <option value="1">1x</option>
                        <option value="2">2x</option>
                        <option value="3" selected>3x</option>
                        <option value="4">4x</option>
                        <option value="5">5x</option>
                        <option value="6">6x</option>
                        <option value="8">8x</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>帧率:</label>
                    <select id="preview-fps">
                        <option value="6">6fps</option>
                        <option value="12" selected>12fps</option>
                        <option value="24">24fps</option>
                        <option value="30">30fps</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>颜色:</label>
                    <input type="color" id="preview-color" value="#ffffff" class="color-input">
                </div>
                <div class="control-group">
                    <label>特效:</label>
                    <select id="effect-type">
                        <option value="none">无</option>
                        <option value="wave">波浪</option>
                        <option value="glow">发光</option>
                        <option value="gradient">渐变</option>
                    </select>
                </div>
                <div class="control-group effect-controls" id="wave-controls" style="display: none;">
                    <label>幅度:</label>
                    <input type="range" id="wave-amp" min="1" max="10" value="3" class="slider">
                    <label>速度:</label>
                    <input type="range" id="wave-speed" min="0.5" max="5" step="0.5" value="2" class="slider">
                    <label>波长:</label>
                    <input type="range" id="wave-length" min="20" max="200" value="80" class="slider">
                </div>
                <div class="control-group effect-controls" id="glow-controls" style="display: none;">
                    <label>强度:</label>
                    <input type="range" id="glow-intensity" min="1" max="10" value="4" class="slider">
                </div>
                <div class="control-group effect-controls" id="gradient-controls" style="display: none;">
                    <label>颜色1:</label>
                    <input type="color" id="gradient-color1" value="#ff6b6b" class="color-input">
                    <label>颜色2:</label>
                    <input type="color" id="gradient-color2" value="#4ecdc4" class="color-input">
                    <label>速度:</label>
                    <input type="range" id="gradient-speed" min="0.5" max="5" step="0.5" value="1" class="slider">
                </div>
            </div>
            <div class="preview-canvas-container">
                <canvas id="preview-canvas"></canvas>
            </div>
        </footer>

        <div id="compare-panel" class="compare-panel">
            <div class="compare-header">
                <h2>字体对比</h2>
                <button id="btn-close-compare" class="close-btn">×</button>
            </div>
            <div class="compare-font-selectors">
                <div class="compare-font-select">
                    <label>字体 A:</label>
                    <select id="compare-font-a"></select>
                </div>
                <span class="compare-arrow">→</span>
                <div class="compare-font-select">
                    <label>字体 B:</label>
                    <select id="compare-font-b"></select>
                </div>
            </div>
            <div class="compare-char-display-box">
                <span class="compare-char-big" id="compare-char-display">A</span>
                <span class="compare-char-code" id="compare-char-code">U+0041</span>
            </div>
            <div class="compare-glyphs-container">
                <div class="compare-glyph-box">
                    <div class="compare-glyph-label">字体 A</div>
                    <canvas id="compare-glyph-a"></canvas>
                </div>
                <div class="compare-glyph-box">
                    <div class="compare-glyph-label">差异</div>
                    <canvas id="compare-diff"></canvas>
                </div>
                <div class="compare-glyph-box">
                    <div class="compare-glyph-label">字体 B</div>
                    <canvas id="compare-glyph-b"></canvas>
                </div>
            </div>
            <div class="compare-stats">
                <div class="stat-item">
                    <span class="stat-label">总像素</span>
                    <span class="stat-value" id="diff-total">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">相同</span>
                    <span class="stat-value" id="diff-same">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">差异</span>
                    <span class="stat-value" id="diff-different">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">相似度</span>
                    <span class="stat-value" id="diff-percent">0%</span>
                </div>
            </div>
            <div class="compare-nav">
                <button id="btn-prev-char" class="nav-btn">← 上一个</button>
                <span id="compare-nav-info" class="nav-info">1 / 1</span>
                <button id="btn-next-char" class="nav-btn">下一个 →</button>
            </div>
            <div class="compare-merge-buttons">
                <div class="merge-row">
                    <button id="btn-merge-a-to-b" class="merge-btn">A → B (单字)</button>
                    <button id="btn-merge-b-to-a" class="merge-btn">B → A (单字)</button>
                </div>
                <div class="merge-row">
                    <button id="btn-merge-all-a-to-b" class="merge-btn primary">全部合并 A → B</button>
                    <button id="btn-merge-all-b-to-a" class="merge-btn primary">全部合并 B → A</button>
                </div>
            </div>
            <div class="compare-legend">
                <span class="legend-item"><span class="legend-color" style="background: #4ecdc4;"></span>仅 A 有</span>
                <span class="legend-item"><span class="legend-color" style="background: #ff6b6b;"></span>仅 B 有</span>
                <span class="legend-item"><span class="legend-color" style="background: #fff;"></span>两者都有</span>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="settings-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>字体设置</h2>
                <button class="modal-close">×</button>
            </div>
            <div class="modal-body">
                <div class="settings-tabs">
                    <button class="settings-tab active" data-tab="size">尺寸</button>
                    <button class="settings-tab" data-tab="metadata">元数据</button>
                    <button class="settings-tab" data-tab="kerning">字距</button>
                    <button class="settings-tab" data-tab="ligatures">连字</button>
                    <button class="settings-tab" data-tab="batch">批量</button>
                </div>
                <div class="settings-pane active" id="settings-size">
                    <div class="form-row">
                        <div class="form-group">
                            <label>字形宽度</label>
                            <input type="number" id="setting-glyph-width" class="form-input" min="4" max="32" value="8">
                        </div>
                        <div class="form-group">
                            <label>字形高度</label>
                            <input type="number" id="setting-glyph-height" class="form-input" min="6" max="32" value="12">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>上升线 (ascent)</label>
                            <input type="number" id="setting-ascent" class="form-input" min="1" max="31" value="9">
                        </div>
                        <div class="form-group">
                            <label>基线 (baseline)</label>
                            <input type="number" id="setting-baseline" class="form-input" min="0" max="31" value="9">
                        </div>
                        <div class="form-group">
                            <label>下降线 (descent)</label>
                            <input type="number" id="setting-descent" class="form-input" min="0" max="31" value="3">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>默认字间距</label>
                        <input type="number" id="setting-default-spacing" class="form-input" min="0" max="10" value="1">
                    </div>
                </div>
                <div class="settings-pane" id="settings-metadata">
                    <div class="form-group">
                        <label>字体名称</label>
                        <input type="text" id="setting-font-name" class="form-input" value="Regular">
                    </div>
                    <div class="form-group">
                        <label>作者</label>
                        <input type="text" id="setting-author" class="form-input" value="">
                    </div>
                    <div class="form-group">
                        <label>版本</label>
                        <input type="text" id="setting-version" class="form-input" value="1.0">
                    </div>
                </div>
                <div class="settings-pane" id="settings-kerning">
                    <div class="kerning-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label>左字符</label>
                                <input type="text" id="kerning-left" class="form-input" maxlength="1" value="A">
                            </div>
                            <div class="form-group">
                                <label>右字符</label>
                                <input type="text" id="kerning-right" class="form-input" maxlength="1" value="V">
                            </div>
                            <div class="form-group">
                                <label>字距值</label>
                                <input type="number" id="kerning-value" class="form-input" value="0">
                            </div>
                        </div>
                        <button id="btn-add-kerning" class="small-btn">添加/更新字距对</button>
                    </div>
                    <div class="kerning-list-container">
                        <h3>字距对列表</h3>
                        <div id="kerning-list" class="kerning-list"></div>
                    </div>
                </div>
                <div class="settings-pane" id="settings-ligatures">
                    <div class="ligature-form">
                        <div class="form-group">
                            <label>连字序列</label>
                            <input type="text" id="ligature-input" class="form-input" placeholder="如: fi, ff">
                        </div>
                        <button id="btn-add-ligature" class="small-btn">添加连字</button>
                    </div>
                    <div class="ligature-list-container">
                        <h3>连字列表</h3>
                        <div id="ligature-list" class="ligature-list"></div>
                    </div>
                </div>
                <div class="settings-pane" id="settings-batch">
                    <div class="batch-controls">
                        <label class="batch-label">批量导入图片</label>
                        <input type="file" id="batch-import" accept="image/*" multiple class="file-input">
                    </div>
                    <div class="batch-preview-container">
                        <h3>字形预览</h3>
                        <div id="batch-preview" class="batch-preview"></div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn secondary">取消</button>
                <button class="modal-btn primary" id="btn-apply-settings">应用</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="component-editor-modal">
        <div class="modal-content wide">
            <div class="modal-header">
                <h2 id="component-editor-title">编辑组件</h2>
                <button class="modal-close" data-modal="component-editor-modal">×</button>
            </div>
            <div class="modal-body">
                <div class="form-row">
                    <div class="form-group">
                        <label>组件名称</label>
                        <input type="text" id="component-name-input" class="form-input" placeholder="输入组件名称">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>宽度</label>
                        <input type="number" id="component-width-input" class="form-input" min="1" max="32" value="5">
                    </div>
                    <div class="form-group">
                        <label>高度</label>
                        <input type="number" id="component-height-input" class="form-input" min="1" max="32" value="5">
                    </div>
                    <div class="form-group" style="display: flex; align-items: flex-end;">
                        <button id="btn-apply-component-size" class="small-btn">应用尺寸</button>
                    </div>
                </div>
                <div class="component-edit-canvas-container">
                    <canvas id="component-edit-canvas"></canvas>
                </div>
                <div class="form-row" style="margin-top: 12px; justify-content: center; gap: 12px;">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label style="display: inline; margin-right: 8px;">当前工具:</label>
                        <button id="btn-component-tool-pencil" class="tool-btn active">✏ 铅笔</button>
                        <button id="btn-component-tool-eraser" class="tool-btn">⌫ 橡皮</button>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn secondary" data-modal-cancel="component-editor-modal">取消</button>
                <button class="modal-btn primary" id="btn-save-component-edit">保存</button>
            </div>
        </div>
    </div>

    <div id="component-tooltip" class="component-tooltip" style="display: none;"></div>
    <div id="component-context-menu" class="context-menu"></div>

    <script src="app.js"></script>
</body>
</html>
